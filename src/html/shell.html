  <script>
  let _excelJsLoaded = false;
  function ensureExcelJS() {
    if (_excelJsLoaded || window.ExcelJS) { _excelJsLoaded = true; return Promise.resolve(); }
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js';
      s.onload = () => { _excelJsLoaded = true; resolve(); };
      s.onerror = () => reject(new Error('ExcelJS load failed'));
      document.head.appendChild(s);
    });
  }
  </script>
  <!-- Supabase JS: carica da CDN, avvio tramite waitForSupabase in misc.js -->
  <script>
    (function () {
      function tryLoad(urls, idx) {
        if (idx >= urls.length) { console.error('[DSWORLD] supabase-js non caricato.'); return; }
        var s = document.createElement('script');
        s.src = urls[idx];
        s.onerror = function () { document.head.removeChild(s); tryLoad(urls, idx + 1); };
        document.head.appendChild(s);
      }
      tryLoad([
        'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2',
        'https://unpkg.com/@supabase/supabase-js@2',
        'https://esm.sh/@supabase/supabase-js@2'
      ], 0);
    })();
  </script>
