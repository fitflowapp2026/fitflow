<div class="modal-backdrop" id="packagesModalBackdrop">
<div class="modal" role="dialog" aria-modal="true">
  <div class="modal-top">
    <div>
      <h3 class="modal-title">Pacchetti</h3>
      <div class="muted small">Crea e seleziona</div>
    </div>
    <button class="btn btn-ghost btn-small" data-close="packagesModalBackdrop">Chiudi</button>
  </div>

  <div class="package-grid">
    <div style="display:grid;gap:12px;">
      <div class="panel" style="padding:16px;">
        <form id="packageForm" style="display:grid;gap:12px;">
          <input type="hidden" id="packageId" />
          <label>Nome
            <input id="packageName" type="text" placeholder="Es. Start 12" required />
          </label>
          <div class="form-grid-2">
            <label>Lezioni
              <input id="packageLessons" type="number" min="1" step="1" value="12" required />
            </label>
            <label>Settimane
              <input id="packageWeeks" type="number" min="1" step="1" value="8" required />
            </label>
          </div>
          <div class="form-grid-3">
            <label>Volte / settimana
              <input id="packagePerWeek" type="number" min="1" step="1" value="2" required />
            </label>
            <label>Durata lezione (min)
              <input id="packageDuration" type="number" min="15" step="5" value="60" required />
            </label>
            <label>Prezzo pacchetto (€)
              <input id="packagePrice" type="number" min="0" step="0.01" value="0" required />
            </label>
          </div>
          <div class="inline-actions">
            <button class="btn btn-primary" type="submit">Salva</button>
            <button class="btn btn-soft" type="button" id="resetPackageBtn">Nuovo</button>
            <button class="btn btn-danger" type="button" id="deletePackageBtn">Elimina</button>
          </div>
        </form>
      </div>
    </div>
    <div class="package-list" id="packageList"></div>
  </div>
</div>
  </div>
